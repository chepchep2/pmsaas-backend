# fly.toml app configuration file generated for pmsaas on 2026-03-03T18:11:20+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pmsaas'
primary_region = 'nrt'

[env]
SPRING_PROFILES_ACTIVE = "prod"
JAVA_OPTS = "-Xmx400m"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
